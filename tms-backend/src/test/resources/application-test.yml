spring:
  datasource:
    url: jdbc:h2:mem:tmstest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MSSQLServer
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_schema: TMS4

  flyway:
    enabled: false

  mail:
    host: localhost
    port: 3025

logging:
  level:
    com.tns.tms: DEBUG
