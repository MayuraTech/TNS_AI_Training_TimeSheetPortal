spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: TMS4

  flyway:
    enabled: false

  mail:
    host: ${MAIL_HOST:smtp.office365.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-hours: 8
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://tms-application-alb-1363434811.us-west-2.elb.amazonaws.com}
  frontend-url: ${FRONTEND_URL:http://tms-application-alb-1363434811.us-west-2.elb.amazonaws.com}

logging:
  level:
    root: WARN
    com.tns.tms: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
