spring:
  datasource:
    url: jdbc:sqlserver://fileracks-sql-db.tnssinc.com:1433;databaseName=TMS;encrypt=true;trustServerCertificate=true
    username: fradmin
    password: FR@dm1n@SQL
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: TMS4
    open-in-view: false

  flyway:
    enabled: false

  mail:
    host: ${MAIL_HOST:smtp.office365.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

app:
  jwt:
    private-key-path: ${JWT_PRIVATE_KEY_PATH:classpath:keys/private.pem}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:classpath:keys/public.pem}
    expiration-hours: 8
    refresh-grace-minutes: 30
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://tms-application-alb-1363434811.us-west-2.elb.amazonaws.com}
  frontend-url: ${FRONTEND_URL:http://tms-application-alb-1363434811.us-west-2.elb.amazonaws.com/qa/ui}

logging:
  level:
    root: WARN
    com.tns.tms: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    db:
      enabled: false
    mail:
      enabled: false
