spring:
  datasource:
    url: jdbc:sqlserver://127.0.0.1:1502;databaseName=TMS;encrypt=true;trustServerCertificate=true
    username: tmsuser
    password: Tms@456
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: TMS4
        dialect: org.hibernate.dialect.SQLServerDialect

  # 🔥 IMPORTANT: Prevent Spring Boot from replacing DB with H2 during tests
  test:
    database:
      replace: none

  flyway:
    enabled: false

logging:
  level:
    com.tns.tms: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

app:
  cors:
    allowed-origins: http://localhost:4200
  frontend-url: http://localhost:4200