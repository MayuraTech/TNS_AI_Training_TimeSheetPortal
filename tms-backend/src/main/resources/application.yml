spring:
  datasource:
    url: jdbc:sqlserver://fileracks-sql-db.tnssinc.com:1433;databaseName=TMS;encrypt=true;trustServerCertificate=true
    username: fradmin
    password: FR@dm1n@SQL
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: TMS4
    open-in-view: false

  # 🔥 IMPORTANT: Prevent Spring Boot from replacing DB with H2 during tests
  test:
    database:
      replace: none 	

  flyway:
    enabled: false
    locations: classpath:db/migration
    schemas: TMS4
    default-schema: TMS4
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.office365.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  thymeleaf:
    check-template-location: false

server:
  port: 8080
  servlet:
    context-path: /qa/api

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    db:
      enabled: false
    mail:
      enabled: false

app:
  jwt:
    private-key-path: ${JWT_PRIVATE_KEY_PATH:classpath:keys/private.pem}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:classpath:keys/public.pem}
    expiration-hours: 8
    refresh-grace-minutes: 30
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,,http://tms-application-alb-1363434811.us-west-2.elb.amazonaws.com,https://tms-application-alb-1363434811.us-west-2.elb.amazonaws.com
}
  frontend-url: ${FRONTEND_URL:http://localhost:4200}
