spring:
  datasource:
    url: jdbc:sqlserver://10.0.2.134;instanceName=SQLEXPRESS;databaseName=TMS;encrypt=true;trustServerCertificate=true
    username: tmsuser
    password: Tms@456
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: TMS4
        dialect: org.hibernate.dialect.SQLServerDialect

  # 🔥 IMPORTANT: Prevent Spring Boot from replacing DB with H2 during tests
  test:
    database:
      replace: none 	

  flyway:
    enabled: false
    locations: classpath:db/migration
    schemas: TMS4
    default-schema: TMS4
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.office365.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html

server:
  port: 8080
  servlet:
    context-path: /

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

app:
  jwt:
    private-key-path: ${JWT_PRIVATE_KEY_PATH:classpath:keys/private.pem}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:classpath:keys/public.pem}
    expiration-hours: 8
    refresh-grace-minutes: 30
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  frontend-url: ${FRONTEND_URL:http://localhost:4200}
