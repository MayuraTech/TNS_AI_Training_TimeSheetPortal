name: Deploy to AWS QA

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
    types: [closed]

env:
  AWS_REGION:   us-west-2
  ECR_API_REPO: 119346096827.dkr.ecr.us-west-2.amazonaws.com/tms-application-qa-api
  ECR_UI_REPO:  119346096827.dkr.ecr.us-west-2.amazonaws.com/tms-application-qa-ui
  ECS_CLUSTER:  tms-application-cluster
  ECS_API_SVC:  tms-application-qa-api
  ECS_UI_SVC:   tms-application-qa-ui
  ALB_DNS:      tms-application-alb-1363434811.us-west-2.elb.amazonaws.com

jobs:
  # ── Job 1: Test Backend ──────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests (no DB required)
        working-directory: tms-backend
        run: |
          mvn test --no-transfer-progress \
            -Dspring.profiles.active=test \
            -Dspring.datasource.url=jdbc:h2:mem:testdb \
            -Dspring.datasource.driver-class-name=org.h2.Driver \
            -Dspring.jpa.hibernate.ddl-auto=create-drop \
            -Dspring.flyway.enabled=false \
            -Dtest="AuthServiceTest,JwtServiceTest,PasswordResetServiceTest,TimesheetServiceTest,DayStatusComputerTest,OvertimeValidatorTest,ApprovalServiceTest,ClarificationServiceTest,HrServiceTest,HolidayCalendarServiceTest,ManagerAssignmentServiceTest,ProjectServiceTest,SystemConfigServiceTest,UserServiceTest,ReportServiceTest" \
            -DfailIfNoTests=false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: tms-backend/target/surefire-reports/

  # ── Job 2: Build & Push API Image ───────────────────────────
  build-api:
    name: Build & Push API
    runs-on: ubuntu-latest
    needs: test-backend
    outputs:
      # Output ONLY the short SHA tag — used to build full image URI in deploy job
      short-sha: ${{ steps.meta.outputs.short-sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate short SHA tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "short-sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Image will be tagged: ${{ env.ECR_API_REPO }}:${SHORT_SHA}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./tms-backend
          file: ./tms-backend/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_API_REPO }}:${{ steps.meta.outputs.short-sha }}
            ${{ env.ECR_API_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Build & Push UI Image ────────────────────────────
  build-ui:
    name: Build & Push UI
    runs-on: ubuntu-latest
    outputs:
      short-sha: ${{ steps.meta.outputs.short-sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate short SHA tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "short-sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: ./tms-frontend
          file: ./tms-frontend/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_UI_REPO }}:${{ steps.meta.outputs.short-sha }}
            ${{ env.ECR_UI_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            API_URL=http://${{ env.ALB_DNS }}

  # ── Job 4: Deploy API to ECS ─────────────────────────────────
  deploy-api:
    name: Deploy API to ECS
    runs-on: ubuntu-latest
    needs: build-api
    environment: QA

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set full image URI
        id: image
        run: |
          IMAGE="${{ env.ECR_API_REPO }}:${{ needs.build-api.outputs.short-sha }}"
          echo "uri=${IMAGE}" >> $GITHUB_OUTPUT
          echo "Deploying image: ${IMAGE}"

      - name: Download current task definition from AWS
        run: |
          aws ecs describe-task-definition \
            --task-definition tms-application-qa-api \
            --query taskDefinition \
            > /tmp/task-definition-api.json
          echo "Current task definition:"
          cat /tmp/task-definition-api.json | python3 -c "import json,sys; td=json.load(sys.stdin); print('Container names:', [c['name'] for c in td.get('containerDefinitions',[])])"

      - name: Detect container name
        id: container
        run: |
          CONTAINER_NAME=$(cat /tmp/task-definition-api.json | python3 -c "import json,sys; td=json.load(sys.stdin); print(td['containerDefinitions'][0]['name'])")
          echo "name=${CONTAINER_NAME}" >> $GITHUB_OUTPUT
          echo "Container name: ${CONTAINER_NAME}"

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: /tmp/task-definition-api.json
          container-name: ${{ steps.container.outputs.name }}
          image: ${{ steps.image.outputs.uri }}

      - name: Deploy API to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service:         ${{ env.ECS_API_SVC }}
          cluster:         ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

  # ── Job 5: Deploy UI to ECS ──────────────────────────────────
  deploy-ui:
    name: Deploy UI to ECS
    runs-on: ubuntu-latest
    needs: [build-ui, deploy-api]
    environment: QA

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set full image URI
        id: image
        run: |
          IMAGE="${{ env.ECR_UI_REPO }}:${{ needs.build-ui.outputs.short-sha }}"
          echo "uri=${IMAGE}" >> $GITHUB_OUTPUT
          echo "Deploying image: ${IMAGE}"

      - name: Download current task definition from AWS
        run: |
          aws ecs describe-task-definition \
            --task-definition tms-application-qa-ui \
            --query taskDefinition \
            > /tmp/task-definition-ui.json
          echo "Container names:"
          cat /tmp/task-definition-ui.json | python3 -c "import json,sys; td=json.load(sys.stdin); print([c['name'] for c in td.get('containerDefinitions',[])])"

      - name: Detect container name
        id: container
        run: |
          CONTAINER_NAME=$(cat /tmp/task-definition-ui.json | python3 -c "import json,sys; td=json.load(sys.stdin); print(td['containerDefinitions'][0]['name'])")
          echo "name=${CONTAINER_NAME}" >> $GITHUB_OUTPUT
          echo "Container name: ${CONTAINER_NAME}"

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: /tmp/task-definition-ui.json
          container-name: ${{ steps.container.outputs.name }}
          image: ${{ steps.image.outputs.uri }}

      - name: Deploy UI to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service:         ${{ env.ECS_UI_SVC }}
          cluster:         ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

  # ── Job 6: Smoke Test ────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-ui]

    steps:
      - name: Wait for services to stabilize
        run: sleep 30

      - name: Test API health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ env.ALB_DNS }}/actuator/health)
          echo "API health status: $STATUS"
          if [ "$STATUS" != "200" ]; then echo "⚠️ API health check returned $STATUS"; fi

      - name: Test UI health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ env.ALB_DNS }}/health)
          echo "UI health status: $STATUS"
          if [ "$STATUS" != "200" ]; then echo "⚠️ UI health check returned $STATUS"; fi

      - name: Deployment summary
        run: |
          echo "✅ Deployment complete!"
          echo "🌐 App: http://${{ env.ALB_DNS }}"
          echo "📦 API: ${{ env.ECR_API_REPO }}:${{ needs.deploy-api.result }}"
