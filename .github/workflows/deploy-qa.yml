name: Deploy to AWS QA

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
    types: [closed]

env:
  AWS_REGION: us-west-2
  ECR_API_REPO: 119346096827.dkr.ecr.us-west-2.amazonaws.com/tms-application-qa-api
  ECR_UI_REPO:  119346096827.dkr.ecr.us-west-2.amazonaws.com/tms-application-qa-ui
  ECS_CLUSTER:  tms-application-cluster
  ECS_API_SVC:  tms-application-qa-api
  ECS_UI_SVC:   tms-application-qa-ui
  ALB_DNS:      tms-application-alb-1363434811.us-west-2.elb.amazonaws.com

jobs:
  # ── Job 1: Test Backend ──────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run backend tests
        working-directory: tms-backend
        run: |
          mvn test --no-transfer-progress \
            -Dspring.profiles.active=test \
            -Dspring.datasource.url=jdbc:h2:mem:testdb \
            -Dspring.datasource.driver-class-name=org.h2.Driver \
            -Dspring.jpa.hibernate.ddl-auto=create-drop \
            -Dspring.flyway.enabled=false \
            -Dtest="AuthServiceTest,JwtServiceTest,PasswordResetServiceTest,TimesheetServiceTest,DayStatusComputerTest,OvertimeValidatorTest,ApprovalServiceTest,ClarificationServiceTest,HrServiceTest,HolidayCalendarServiceTest,ManagerAssignmentServiceTest,ProjectServiceTest,SystemConfigServiceTest,UserServiceTest,ReportServiceTest" \
            -DfailIfNoTests=false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: tms-backend/target/surefire-reports/

  # ── Job 2: Build & Push API Image ───────────────────────────
  build-api:
    name: Build & Push API
    runs-on: ubuntu-latest
    needs: test-backend
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          echo "tags=${{ env.ECR_API_REPO }}:${SHORT_SHA},${{ env.ECR_API_REPO }}:latest" >> $GITHUB_OUTPUT
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./tms-backend
          file: ./tms-backend/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_API_REPO }}:${{ steps.meta.outputs.tag }}
            ${{ env.ECR_API_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  # ── Job 3: Build & Push UI Image ────────────────────────────
  build-ui:
    name: Build & Push UI
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: ./tms-frontend
          file: ./tms-frontend/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_UI_REPO }}:${{ steps.meta.outputs.tag }}
            ${{ env.ECR_UI_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            API_URL=http://${{ env.ALB_DNS }}

  # ── Job 4: Deploy API to ECS ─────────────────────────────────
  deploy-api:
    name: Deploy API to ECS
    runs-on: ubuntu-latest
    needs: build-api
    environment: QA

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: aws/ecs/task-definition-api.json
          container-name: tms-api
          image: ${{ env.ECR_API_REPO }}:${{ needs.build-api.outputs.image-tag }}

      - name: Deploy API to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service:         ${{ env.ECS_API_SVC }}
          cluster:         ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

  # ── Job 5: Deploy UI to ECS ──────────────────────────────────
  deploy-ui:
    name: Deploy UI to ECS
    runs-on: ubuntu-latest
    needs: [build-ui, deploy-api]
    environment: QA

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: aws/ecs/task-definition-ui.json
          container-name: tms-ui
          image: ${{ env.ECR_UI_REPO }}:${{ needs.build-ui.outputs.image-tag }}

      - name: Deploy UI to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service:         ${{ env.ECS_UI_SVC }}
          cluster:         ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

  # ── Job 6: Smoke Test ────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-ui]

    steps:
      - name: Wait for services to stabilize
        run: sleep 30

      - name: Test API health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ env.ALB_DNS }}/actuator/health)
          echo "API health status: $STATUS"
          if [ "$STATUS" != "200" ]; then echo "API health check failed!" && exit 1; fi

      - name: Test UI health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ env.ALB_DNS }}/health)
          echo "UI health status: $STATUS"
          if [ "$STATUS" != "200" ]; then echo "UI health check failed!" && exit 1; fi

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 App URL: http://${{ env.ALB_DNS }}"
          echo "📦 API: ${{ env.ECR_API_REPO }}:latest"
          echo "🖥️  UI:  ${{ env.ECR_UI_REPO }}:latest"
