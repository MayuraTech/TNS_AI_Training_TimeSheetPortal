name: Deploy to AWS QA

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
    types: [closed]

env:
  AWS_REGION:   us-west-2
  ECR_API_REPO: 119346096827.dkr.ecr.us-west-2.amazonaws.com/tms-application-qa-api
  ECR_UI_REPO:  119346096827.dkr.ecr.us-west-2.amazonaws.com/tms-application-qa-ui
  ECS_CLUSTER:  tms-application-cluster
  ECS_API_SVC:  tms-application-qa-api
  ECS_UI_SVC:   tms-application-qa-ui
  ALB_DNS:      tms-application-alb-1363434811.us-west-2.elb.amazonaws.com

jobs:
  # ── Job 1: Test Backend ──────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        working-directory: tms-backend
        run: |
          mvn test --no-transfer-progress \
            -Dspring.profiles.active=test \
            -Dspring.datasource.url=jdbc:h2:mem:testdb \
            -Dspring.datasource.driver-class-name=org.h2.Driver \
            -Dspring.jpa.hibernate.ddl-auto=create-drop \
            -Dspring.flyway.enabled=false \
            -Dtest="AuthServiceTest,JwtServiceTest,PasswordResetServiceTest,TimesheetServiceTest,DayStatusComputerTest,OvertimeValidatorTest,ApprovalServiceTest,ClarificationServiceTest,HrServiceTest,HolidayCalendarServiceTest,ManagerAssignmentServiceTest,ProjectServiceTest,SystemConfigServiceTest,UserServiceTest,ReportServiceTest" \
            -DfailIfNoTests=false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: tms-backend/target/surefire-reports/

  # ── Job 2: Build & Push API Image ───────────────────────────
  build-api:
    name: Build & Push API
    runs-on: ubuntu-latest
    needs: test-backend
    outputs:
      short-sha: ${{ steps.meta.outputs.short-sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate short SHA tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "short-sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./tms-backend
          file: ./tms-backend/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_API_REPO }}:${{ steps.meta.outputs.short-sha }}
            ${{ env.ECR_API_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Build & Push UI Image ────────────────────────────
  build-ui:
    name: Build & Push UI
    runs-on: ubuntu-latest
    outputs:
      short-sha: ${{ steps.meta.outputs.short-sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate short SHA tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "short-sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: ./tms-frontend
          file: ./tms-frontend/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_UI_REPO }}:${{ steps.meta.outputs.short-sha }}
            ${{ env.ECR_UI_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            API_URL=http://${{ env.ALB_DNS }}

  # ── Job 4: Deploy API to ECS ─────────────────────────────────
  deploy-api:
    name: Deploy API to ECS
    runs-on: ubuntu-latest
    needs: build-api
    environment: QA

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy API — update image and register task definition
        run: |
          NEW_IMAGE="${{ env.ECR_API_REPO }}:${{ needs.build-api.outputs.short-sha }}"
          echo "New image: ${NEW_IMAGE}"

          # Fetch live task definition
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_API_SVC }} \
            --query taskDefinition > /tmp/td-api.json

          # Show container names for debugging
          echo "Container names in live task def:"
          python3 -c "import json; td=json.load(open('/tmp/td-api.json')); [print(' -',c['name']) for c in td['containerDefinitions']]"

          # Update image on ALL containers (handles any container name)
          python3 << PYEOF
          import json, os
          new_image = "${NEW_IMAGE}"
          with open('/tmp/td-api.json') as f:
              td = json.load(f)
          for c in td['containerDefinitions']:
              # Rename container to 'api' — ECS service LB config requires this name
              c['name'] = 'api'
              c['image'] = new_image
              print(f"Container set to name=api, image={new_image}")
          for k in ['taskDefinitionArn','revision','status','requiresAttributes',
                    'compatibilities','registeredAt','registeredBy','deregisteredAt']:
              td.pop(k, None)
          with open('/tmp/td-api-new.json','w') as f:
              json.dump(td, f)
          PYEOF

          # Register new revision
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/td-api-new.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered: ${NEW_ARN}"

          # Update service
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_API_SVC }} \
            --task-definition "${NEW_ARN}" \
            --force-new-deployment

          echo "Waiting for stability (up to 10 min)..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_API_SVC }}
          echo "✅ API deployed: ${NEW_IMAGE}"

  # ── Job 5: Deploy UI to ECS ──────────────────────────────────
  deploy-ui:
    name: Deploy UI to ECS
    runs-on: ubuntu-latest
    needs: [build-ui, deploy-api]
    environment: QA

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy UI — update image and register task definition
        run: |
          NEW_IMAGE="${{ env.ECR_UI_REPO }}:${{ needs.build-ui.outputs.short-sha }}"
          echo "New image: ${NEW_IMAGE}"

          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_UI_SVC }} \
            --query taskDefinition > /tmp/td-ui.json

          echo "Container names in live task def:"
          python3 -c "import json; td=json.load(open('/tmp/td-ui.json')); [print(' -',c['name']) for c in td['containerDefinitions']]"

          python3 << PYEOF
          import json
          new_image = "${NEW_IMAGE}"
          with open('/tmp/td-ui.json') as f:
              td = json.load(f)
          for c in td['containerDefinitions']:
              # Rename container to 'ui' — ECS service LB config requires this name
              c['name'] = 'ui'
              c['image'] = new_image
              print(f"Container set to name=ui, image={new_image}")
          for k in ['taskDefinitionArn','revision','status','requiresAttributes',
                    'compatibilities','registeredAt','registeredBy','deregisteredAt']:
              td.pop(k, None)
          with open('/tmp/td-ui-new.json','w') as f:
              json.dump(td, f)
          PYEOF

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/td-ui-new.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered: ${NEW_ARN}"

          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_UI_SVC }} \
            --task-definition "${NEW_ARN}" \
            --force-new-deployment

          echo "Waiting for stability..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_UI_SVC }}
          echo "✅ UI deployed: ${NEW_IMAGE}"

  # ── Job 6: Smoke Test ────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-ui]

    steps:
      - name: Wait for ALB to route traffic
        run: sleep 30

      - name: Test API health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ env.ALB_DNS }}/actuator/health || echo "000")
          echo "API health: $STATUS"

      - name: Test UI
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ env.ALB_DNS }}/ || echo "000")
          echo "UI status: $STATUS"

      - name: Summary
        run: |
          echo "✅ Deployment complete!"
          echo "🌐 URL: http://${{ env.ALB_DNS }}"
