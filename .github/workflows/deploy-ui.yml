name: Deploy UI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'tms-frontend/**'

permissions:
  contents: read

concurrency:
  group: deploy-ui-qa
  cancel-in-progress: false

jobs:
  deploy-qa:
    name: Deploy UI to QA
    runs-on: ubuntu-latest
    
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build, tag, and push image to ECR
        env:
          ECR_URI: ${{ secrets.ECR_URI_QA_UI }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          docker build -t "$ECR_URI:$IMAGE_TAG" ./tms-frontend
          docker push "$ECR_URI:$IMAGE_TAG"
          docker tag "$ECR_URI:$IMAGE_TAG" "$ECR_URI:latest"
          docker push "$ECR_URI:latest"
      
      - name: Update ECS task definition
        id: update-task-def
        env:
          ECR_URI: ${{ secrets.ECR_URI_QA_UI }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          TASK_FAMILY="tms-application-qa-ui"
          
          aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" \
            --region "$AWS_REGION" \
            --query taskDefinition \
            --output json | jq --arg IMAGE "$ECR_URI:$IMAGE_TAG" \
            'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy,.deregisteredAt,.enableFaultInjection) | .containerDefinitions[0].image = $IMAGE' > task-def.json
          
          NEW_REVISION=$(aws ecs register-task-definition \
            --region "$AWS_REGION" \
            --cli-input-json "file://$(pwd)/task-def.json" \
            --query 'taskDefinition.revision' \
            --output text)
          
          echo "revision=$NEW_REVISION" >> "$GITHUB_OUTPUT"
      
      - name: Deploy to ECS
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster tms-application-cluster \
            --service tms-application-qa-ui \
            --task-definition "tms-application-qa-ui:${{ steps.update-task-def.outputs.revision }}" \
            --region "$AWS_REGION"
      
      - name: Wait for deployment to complete
        run: |
          set -euo pipefail
          aws ecs wait services-stable \
            --cluster tms-application-cluster \
            --services tms-application-qa-ui \
            --region "$AWS_REGION"
